<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
<!-- AI Interaction Focus -->
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Dynamic AI Orb / Visualizer Area -->
<div class="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center mb-16">
<!-- Inner Core -->
<div class="absolute w-48 h-48 md:w-64 md:h-64 orb-gradient rounded-full blur-2xl opacity-60"></div>
<!-- Fluid Waveform/Orb -->
<div class="relative w-40 h-40 md:w-56 md:h-56 bg-white/10 border border-white/20 rounded-full flex items-center justify-center glass-panel shadow-[0px_0px_60px_rgba(75,79,176,0.4)]">

<div class="absolute top-10 left-20 w-1 h-1 bg-white rounded-full opacity-30"></div>
<div class="absolute bottom-10 right-20 w-1.5 h-1.5 bg-[#d8e2ff] rounded-full opacity-40"></div>
<div class="absolute top-1/2 right-4 w-1 h-1 bg-white rounded-full opacity-20"></div>
</div>
</div>

<span class="text-[#d8e2ff] font-headline text-2xl md:text-3xl font-semibold tracking-tight">Listening...</span>

<div class="w-12 h-12 bg-primary-container/20 rounded-2xl flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-[#d8e2ff]">auto_awesome</span>
</div>
<div>
<h3 class="text-[#d8e2ff] font-semibold text-base mb-1">Probability suggests...</h3>
<p class="text-on-surface-variant text-sm leading-relaxed opacity-80">Based on your recent portfolio query, the current market volatility indicates a 68% probability of a bullish correction in the next 4 hours.</p>
</div>
</div>
</div>

<button class="flex flex-col items-center gap-2 group transition-all duration-300">
<div class="p-4 text-[#454652] hover:bg-white/10 rounded-2xl transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined text-3xl">mic</span>
</div>
<span class="text-[10px] text-on-surface-variant font-bold tracking-widest uppercase opacity-40">Mute</span>

<!-- End Call (Prominent Red) -->
<button class="relative group active:scale-95 transition-all duration-300">

<!-- Speaker Toggle -->
<button class="flex flex-col items-center gap-2 group transition-all duration-300">
<div class="p-4 text-[#454652] hover:bg-white/10 rounded-2xl transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined text-3xl">volume_up</span>
